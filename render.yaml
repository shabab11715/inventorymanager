services:
  - type: web
    name: inventorymanager-api
    runtime: docker
    rootDir: backend
    dockerfilePath: InventoryManager.WebApi/Dockerfile
    autoDeploy: true
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: inventorymanager-db
          property: connectionString
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: Jwt__SigningKey
        sync: false
      - key: SendGrid__ApiKey
        sync: false
      - key: Cloudinary__CloudName
        sync: false
      - key: Cloudinary__ApiKey
        sync: false
      - key: Cloudinary__ApiSecret
        sync: false
      - key: Cloudinary__UploadPreset
        sync: false
      - key: Cors__AllowedOrigins__0
        fromService:
          type: static_site
          name: inventorymanager-web
          property: url
      - key: AdminBootstrap__SetupKey
        sync: false

  - type: static_site
    name: inventorymanager-web
    rootDir: frontend/inventorymanager-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: inventorymanager-api
          property: url

databases:
  - name: inventorymanager-db
    plan: free